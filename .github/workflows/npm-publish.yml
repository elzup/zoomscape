name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write # OIDC: required for Trusted Publishing + provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24" # npm >= 11.5.1 for OIDC trusted publishing
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Strip placeholder token so OIDC engages
        # setup-node writes a dummy :_authToken when registry-url is set; if it
        # stays, npm skips the OIDC handshake and fails with E404. Remove it.
        run: |
          sed -i '/:_authToken=/d; /always-auth/d' "$NPM_CONFIG_USERCONFIG"
          cat "$NPM_CONFIG_USERCONFIG"
      - run: npm install
      - run: npm publish --provenance --access public
